<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#070a0f">
<title>MicStream</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070a0f; --surface:#0d1117; --surface2:#161b22;
  --border:#21262d; --accent:#00ff88; --accent2:#00ccff;
  --text:#e6edf3; --muted:#7d8590; --danger:#ff4757;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;touch-action:manipulation;}

.bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(0,255,136,.1) 0%,transparent 70%);pointer-events:none;transition:opacity .5s;}
.bg-glow.on{background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(0,255,136,.2) 0%,transparent 70%);}

.page{
  position:relative;z-index:1;
  height:100%;
  display:flex;flex-direction:column;
  padding:calc(var(--safe-top) + 16px) 20px calc(var(--safe-bot) + 24px);
  max-width:420px;margin:0 auto;
}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ico{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-txt{font-size:18px;font-weight:800;}
.logo-txt span{color:var(--accent);}
.badge{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);transition:all .3s;}
.badge.on{border-color:rgba(0,255,136,.4);color:var(--accent);}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* Server input */
.server-row{display:flex;gap:8px;margin-bottom:14px;}
.server-input{
  flex:1;padding:10px 12px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'Space Mono',monospace;font-size:12px;
  outline:none;
}
.server-input:focus{border-color:var(--accent);}
.btn-connect{
  padding:10px 16px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;
}

/* Mic area */
.mic-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}

.rings{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,255,136,.12);animation:ro 3s ease-out infinite;opacity:0;}
.ring:nth-child(1){width:100%;height:100%;animation-delay:0s;}
.ring:nth-child(2){width:78%;height:78%;animation-delay:.9s;}
.ring:nth-child(3){width:56%;height:56%;animation-delay:1.8s;}
@keyframes ro{0%{transform:scale(.7);opacity:.4}100%{transform:scale(1.1);opacity:0}}
.ring.on{border-color:rgba(0,255,136,.35);animation-duration:1.4s;}

.mic-btn{
  width:116px;height:116px;border-radius:50%;
  background:var(--surface);border:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;z-index:2;-webkit-user-select:none;
}
.mic-btn:active{transform:scale(.92);}
.mic-btn.on{
  background:linear-gradient(135deg,rgba(0,255,136,.15),rgba(0,204,255,.1));
  border-color:var(--accent);
  box-shadow:0 0 40px rgba(0,255,136,.3),0 0 80px rgba(0,255,136,.08);
}
.mic-ico{font-size:38px;line-height:1;}
.mic-btn.on .mic-ico{animation:mp 1s ease-in-out infinite;}
@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.mic-lbl{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:1px;margin-top:4px;transition:color .3s;}
.mic-btn.on .mic-lbl{color:var(--accent);}

.status-txt{text-align:center;}
.st-main{font-size:19px;font-weight:700;margin-bottom:3px;transition:color .3s;}
.st-main.on{color:var(--accent);}
.st-sub{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}

/* Wave */
.wave-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;height:72px;position:relative;overflow:hidden;}
#wc{width:100%;height:100%;display:block;}
.wlbl{position:absolute;top:7px;left:11px;font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;transition:border-color .3s;}
.sc.on{border-color:rgba(0,255,136,.3);}
.sv{font-size:18px;font-weight:800;font-family:'Space Mono',monospace;color:var(--accent);line-height:1;}
.sk{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:3px;font-family:'Space Mono',monospace;}

/* Quality */
.qual-row{display:flex;gap:6px;}
.qb{flex:1;padding:8px 4px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;text-align:center;transition:all .2s;}
.qb.sel{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,.05);}

/* Perm overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(7,10,15,.97);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
.overlay.show{display:flex;}
.ov-ico{font-size:60px;margin-bottom:20px;}
.ov-title{font-size:22px;font-weight:800;margin-bottom:10px;}
.ov-txt{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px;}
.btn-allow{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;border:none;cursor:pointer;}
</style>
</head>
<body>
<div class="bg-glow" id="glow"></div>

<!-- Permission -->
<div class="overlay show" id="perm">
  <div class="ov-ico">🎙️</div>
  <div class="ov-title">Нужен микрофон</div>
  <div class="ov-txt">MicStream будет транслировать звук с микрофона на ПК по Wi-Fi.</div>
  <button class="btn-allow" onclick="reqMic()">Разрешить доступ</button>
</div>

<div class="page">
  <div class="hdr">
    <div class="logo">
      <div class="logo-ico">🎙</div>
      <div class="logo-txt">Mic<span>Stream</span></div>
    </div>
    <div class="badge" id="badge"><div class="bdot"></div><span id="bTxt">OFFLINE</span></div>
  </div>

  <!-- Server IP input -->
  <div class="server-row">
    <input class="server-input" id="ipInput" type="text" placeholder="192.168.x.x:3000" inputmode="url">
    <button class="btn-connect" onclick="connectWS()">Подключить</button>
  </div>

  <!-- Mic -->
  <div class="mic-area">
    <div class="rings" id="rings">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="mic-btn" id="micBtn" onclick="toggle()">
        <div class="mic-ico">🎤</div>
        <div class="mic-lbl" id="micLbl">НАЖМИ</div>
      </div>
    </div>
    <div class="status-txt">
      <div class="st-main" id="stMain">Введи IP сервера</div>
      <div class="st-sub" id="stSub">Укажи адрес ПК выше</div>
    </div>
  </div>

  <!-- Wave -->
  <div class="wave-box" style="margin-bottom:10px">
    <span class="wlbl">МИК СИГНАЛ</span>
    <canvas id="wc"></canvas>
  </div>

  <!-- Stats -->
  <div class="stats" style="margin-bottom:10px">
    <div class="sc" id="sc1"><div class="sv" id="sTime">0:00</div><div class="sk">ВРЕМЯ</div></div>
    <div class="sc" id="sc2"><div class="sv" id="sPkts">0</div><div class="sk">ПАКЕТЫ</div></div>
    <div class="sc" id="sc3"><div class="sv" id="sKb">0</div><div class="sk">KB ОТПРАВЛЕНО</div></div>
  </div>

  <!-- Quality -->
  <div class="qual-row">
    <div class="qb" onclick="setQ(this,4096)">ЭКО<br><span style="opacity:.6">низк. качество</span></div>
    <div class="qb sel" onclick="setQ(this,2048)">НОРМ<br><span style="opacity:.6">оптимально</span></div>
    <div class="qb" onclick="setQ(this,1024)">ХАЙ<br><span style="opacity:.6">макс. качество</span></div>
  </div>
</div>

<script>
let ws=null, stream=null, audioCtx=null, processor=null, analyser=null;
let streaming=false, bufSize=2048, pkts=0, bytes=0, sessStart=null, timer=null;

function setQ(el, sz) {
  bufSize = sz;
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

async function reqMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true, sampleRate:44100 } });
    document.getElementById('perm').classList.remove('show');
    initAudio();
    // Try to load saved IP
    const saved = localStorage.getItem('micstream_ip');
    if (saved) document.getElementById('ipInput').value = saved;
  } catch(e) {
    alert('Ошибка доступа к микрофону: ' + e.message);
  }
}

function initAudio() {
  audioCtx = new (window.AudioContext||window.webkitAudioContext)({ sampleRate:44100 });
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  drawWave();
}

function connectWS() {
  const raw = document.getElementById('ipInput').value.trim();
  if (!raw) { alert('Введи IP адрес ПК'); return; }
  const host = raw.includes(':') ? raw : raw + ':3000';
  localStorage.setItem('micstream_ip', host);

  if (ws) { try{ws.close();}catch(e){} }

  // Try wss first, fallback handled by server redirect
  ws = new WebSocket(`wss://${host}/ws/phone`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setConn(true);
    document.getElementById('stMain').textContent = 'Подключён к ПК';
    document.getElementById('stSub').textContent = 'Нажми кнопку для старта';
  };
  ws.onmessage = (e) => {
    try {
      const m = JSON.parse(e.data);
      if (m.type === 'pc-ready') document.getElementById('stSub').textContent = 'ПК готов к приёму';
    } catch(err){}
  };
  ws.onclose = () => {
    setConn(false);
    if (streaming) stopStream();
    document.getElementById('stMain').textContent = 'Соединение разорвано';
    document.getElementById('stSub').textContent = 'Нажми "Подключить" снова';
    setTimeout(() => { if(!ws || ws.readyState > 1) connectWS(); }, 3000);
  };
  ws.onerror = () => {};
}

function setConn(v) {
  const b = document.getElementById('badge');
  b.className = 'badge' + (v ? ' on' : '');
  document.getElementById('bTxt').textContent = v ? 'ОНЛАЙН' : 'OFFLINE';
}

function toggle() {
  if (!ws || ws.readyState !== 1) { alert('Сначала подключись к серверу'); return; }
  if (!audioCtx) return;
  streaming ? stopStream() : startStream();
}

function startStream() {
  streaming = true; pkts = 0; bytes = 0; sessStart = Date.now();
  processor = audioCtx.createScriptProcessor(bufSize, 1, 1);
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(processor);
  processor.connect(audioCtx.destination);
  processor.onaudioprocess = (e) => {
    if (!streaming || ws?.readyState !== 1) return;
    const pcm = e.inputBuffer.getChannelData(0);
    const buf = pcm.buffer.slice(pcm.byteOffset, pcm.byteOffset + pcm.byteLength);
    ws.send(buf); pkts++; bytes += buf.byteLength;
    document.getElementById('sPkts').textContent = pkts;
    document.getElementById('sKb').textContent = Math.floor(bytes/1024);
  };
  ws.send(JSON.stringify({ type: 'streaming-start' }));
  timer = setInterval(() => {
    const s = Math.floor((Date.now()-sessStart)/1000);
    document.getElementById('sTime').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }, 1000);
  // UI
  document.getElementById('micBtn').classList.add('on');
  document.getElementById('micLbl').textContent = 'СТОП';
  document.getElementById('stMain').textContent = 'Трансляция идёт';
  document.getElementById('stMain').className = 'st-main on';
  document.getElementById('stSub').textContent = 'Звук идёт на ПК';
  document.getElementById('glow').classList.add('on');
  document.querySelectorAll('.ring').forEach(r=>r.classList.add('on'));
  document.querySelectorAll('.sc').forEach(c=>c.classList.add('on'));
}

function stopStream() {
  streaming = false;
  if (processor) { processor.disconnect(); processor = null; }
  if (timer) clearInterval(timer);
  ws?.readyState === 1 && ws.send(JSON.stringify({ type: 'streaming-stop' }));
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micLbl').textContent = 'НАЖМИ';
  document.getElementById('stMain').textContent = 'Остановлено';
  document.getElementById('stMain').className = 'st-main';
  document.getElementById('stSub').textContent = 'Нажми снова для старта';
  document.getElementById('glow').classList.remove('on');
  document.querySelectorAll('.ring').forEach(r=>r.classList.remove('on'));
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('on'));
}

function drawWave() {
  const canvas = document.getElementById('wc');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = canvas.offsetWidth*devicePixelRatio; canvas.height = canvas.offsetHeight*devicePixelRatio; ctx.scale(devicePixelRatio,devicePixelRatio); }
  resize();
  (function draw() {
    requestAnimationFrame(draw);
    const w=canvas.offsetWidth, h=canvas.offsetHeight;
    ctx.clearRect(0,0,w,h);
    if (!analyser) return;
    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(buf);
    let mx=0; for(let i=0;i<buf.length;i++) mx=Math.max(mx,Math.abs(buf[i]/128-1));
    const a = streaming ? .5+mx : .25;
    ctx.strokeStyle = `rgba(0,255,136,${a})`;
    ctx.shadowColor = `rgba(0,255,136,${mx*.5})`;
    ctx.shadowBlur = streaming ? mx*12 : 0;
    ctx.lineWidth = 1.5; ctx.beginPath();
    for(let i=0;i<buf.length;i++) {
      const x=(i/buf.length)*w, y=(buf[i]/128)*(h/2);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  })();
}
</script>
</body>
</html>
